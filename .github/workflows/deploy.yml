name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    environment:
      name: github-pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: false

      - name: Checkout private submodules
        shell: bash
        env:
          SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
        run: |
          set -euo pipefail

          git submodule sync --recursive

          if [ -n "${SUBMODULES_TOKEN}" ]; then
            SUBMODULES_TOKEN="$(printf '%s' "${SUBMODULES_TOKEN}" | tr -d '[:space:]')"
            git -c url."https://x-access-token:${SUBMODULES_TOKEN}@github.com/".insteadOf="https://github.com/" \
              submodule update --init --recursive
          else
            git submodule update --init --recursive
          fi

      - name: Build static site
        shell: bash
        run: |
          set -euo pipefail

          rm -rf _site
          mkdir -p _site/values _site/ipaenglish _site/bookmash_ttr _site/privacy

          cp ads.txt _site/ads.txt
          cp index.html _site/index.html
          cp robots.txt _site/robots.txt
          cp sitemap.xml _site/sitemap.xml
          cp google*.html _site/
          cp privacy/trip_money_privacy.html _site/privacy/trip_money_privacy.html
          touch _site/.nojekyll

          cp web_value_worldcup/values.html _site/values/index.html
          cp web_value_worldcup/style.css _site/values/style.css
          cp web_value_worldcup/app.js _site/values/app.js

          cp web_ipa_english/ipaenglish.html _site/ipaenglish/index.html

          cp bookmash_ttr/index.html _site/bookmash_ttr/index.html
          cp bookmash_ttr/bookmesh.html _site/bookmash_ttr/bookmesh.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
