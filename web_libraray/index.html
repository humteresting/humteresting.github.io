<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>공공도서관 도서 검색</title>
    <meta
      name="description"
      content="도서를 검색하고 현재 위치에서 가까운 공공도서관을 거리순으로 확인하세요."
    >
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Public Library Finder</p>
        <h1>당신 근처의 도서관</h1>
      </div>
      <div class="location-control">
        <button class="ghost-button" id="locationButton" type="button">위치 설정</button>
        <p id="locationSummary">위치를 설정하면 가까운 공공도서관을 먼저 보여드립니다.</p>
        <div class="location-presets" aria-label="기준 위치 빠른 선택">
          <button type="button" data-lat="37.5665" data-lng="126.9780">서울</button>
          <button type="button" data-lat="35.1796" data-lng="129.0756">부산</button>
          <button type="button" data-lat="37.4563" data-lng="126.7052">인천</button>
          <button type="button" data-lat="36.3504" data-lng="127.3845">대전</button>
          <button type="button" data-lat="35.8714" data-lng="128.6014">대구</button>
          <button type="button" data-lat="35.1595" data-lng="126.8526">광주</button>
          <button type="button" data-lat="33.4996" data-lng="126.5312">제주</button>
        </div>
      </div>
    </header>

    <main class="app-shell">
      <section class="content-grid">
        <div class="list-section library-section" aria-labelledby="libraryResultsTitle">
          <div class="section-heading">
            <h2 id="libraryResultsTitle">가까운 공공도서관</h2>
            <p id="selectedBookText">위치를 설정하면 가까운 도서관부터 표시됩니다.</p>
          </div>
          <div id="libraryResults" class="library-list empty-state">
            먼저 위치 설정을 눌러 현재 위치 기준의 도서관 목록을 확인하세요.
          </div>
        </div>

        <div class="list-section" aria-labelledby="bookResultsTitle">
          <div class="section-heading">
            <h2 id="bookResultsTitle">검색 결과</h2>
            <p>위치를 설정한 뒤 책을 검색하면 도서관 목록이 함께 갱신됩니다.</p>
          </div>
          <div id="bookResults" class="book-list empty-state">
            위치를 설정한 뒤 도서명, 저자명, ISBN으로 검색해 보세요.
          </div>
        </div>
      </section>

      <section class="search-panel" aria-labelledby="searchTitle">
        <div class="section-heading">
          <h2 id="searchTitle">도서 검색</h2>
          <p>가까운 도서관을 확인한 다음 도서명, 저자명, ISBN으로 검색할 수 있습니다.</p>
        </div>
        <form id="searchForm" class="search-form">
          <label for="query">검색어</label>
          <div class="search-row">
            <input
              id="query"
              name="query"
              type="search"
              placeholder="예: 토지, 박경리, 978..."
              autocomplete="off"
              disabled
              required
            >
            <button type="submit" disabled>검색</button>
          </div>
        </form>
        <p class="status" id="searchStatus" role="status">위치 설정을 먼저 완료해 주세요.</p>
      </section>
    </main>

    <template id="bookTemplate">
      <button class="book-item" type="button">
        <span class="book-title"></span>
        <span class="book-meta"></span>
        <span class="book-isbn"></span>
      </button>
    </template>

    <template id="libraryTemplate">
      <article class="library-item">
        <div>
          <h3></h3>
          <p class="library-address"></p>
          <p class="library-contact"></p>
        </div>
        <div class="library-actions">
          <span class="distance-badge"></span>
          <button class="favorite-button" type="button" aria-pressed="false"></button>
        </div>
      </article>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
